# ─── Font ─────────────────────────────────────────────────────────────────────
font_family      Hack Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ─── Cursor ──────────────────────────────────────────────────────────────────
cursor_shape          beam
cursor_blink_interval 0.5
shell_integration     enabled
cursor_trail          3
cursor_trail_decay    0.1 0.4
cursor_trail_start_threshold 2

# ─── Scrollback ──────────────────────────────────────────────────────────────
scrollback_lines 50000
scrollback_pager bat --style=plain --paging=always

# ─── Mouse ───────────────────────────────────────────────────────────────────
copy_on_select        clipboard
mouse_hide_wait       3.0
url_style             curly
strip_trailing_spaces smart
select_by_word_characters @-./_~?&=%+#:

# ─── Mouse Mappings ─────────────────────────────────────────────────────────
# Ctrl+Click to open links (like GNOME Terminal / VS Code)
mouse_map ctrl+left click ungrabbed mouse_handle_click link
mouse_map ctrl+left click grabbed mouse_handle_click link

# Right-click to paste from clipboard
mouse_map right press ungrabbed paste_from_clipboard
mouse_map right press grabbed paste_from_clipboard

# Ctrl+right-click to extend selection (useful alternative)
mouse_map ctrl+right press ungrabbed mouse_selection extend

# ─── Window ──────────────────────────────────────────────────────────────────
window_padding_width    4
confirm_os_window_close 0
enabled_layouts         splits,tall,fat,grid,stack
background_opacity      0.85

# ─── Tab Bar ─────────────────────────────────────────────────────────────────
tab_bar_edge          bottom
tab_bar_style         powerline
tab_powerline_style   slanted
tab_title_template    "{index}: {title}"

# ─── Remote Control ─────────────────────────────────────────────────────────
allow_remote_control yes
listen_on            unix:/tmp/kitty-{kitty_pid}

# ─── Performance ─────────────────────────────────────────────────────────────
repaint_delay   6
input_delay     1
sync_to_monitor yes

# ─── Bell ────────────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0

# ─── Catppuccin Mocha Theme ──────────────────────────────────────────────────
foreground              #CDD6F4
background              #000000
selection_foreground    #1E1E2E
selection_background    #F5E0DC
cursor                  #F5E0DC
cursor_text_color       #1E1E2E
url_color               #F5E0DC

# Black
color0  #45475A
color8  #585B70

# Red
color1  #F38BA8
color9  #F38BA8

# Green
color2  #A6E3A1
color10 #A6E3A1

# Yellow
color3  #F9E2AF
color11 #F9E2AF

# Blue
color4  #89B4FA
color12 #89B4FA

# Magenta
color5  #F5C2E7
color13 #F5C2E7

# Cyan
color6  #94E2D5
color14 #94E2D5

# White
color7  #BAC2DE
color15 #A6ADC8

# Tab bar colors
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Mark colors
mark1_foreground #1E1E2E
mark1_background #B4BEFE
mark2_foreground #1E1E2E
mark2_background #CBA6F7
mark3_foreground #1E1E2E
mark3_background #74C7EC

# ─── Keybindings ─────────────────────────────────────────────────────────────
# Clear screen + scrollback
map ctrl+l clear_terminal scrollback active

# Tabs
map ctrl+shift+t     new_tab
map ctrl+shift+q     close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab

# Windows (splits) — Terminator-style
map ctrl+shift+o     launch --location=hsplit --cwd=current
map ctrl+shift+e     launch --location=vsplit --cwd=current
map ctrl+shift+w     close_window
map ctrl+shift+enter new_window

# Navigate between splits
map ctrl+shift+]     next_window
map ctrl+shift+[     previous_window
map alt+left         neighboring_window left
map alt+right        neighboring_window right
map alt+up           neighboring_window up
map alt+down         neighboring_window down

# Paste actions
paste_actions no-op

# Resize

map ctrl+left resize_window narrower
map ctrl+right resize_window wider
map ctrl+up resize_window taller
map ctrl+down resize_window shorter
map ctrl+home resize_window reset  # Resets to default
