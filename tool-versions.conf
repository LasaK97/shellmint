# =============================================================================
# tool-versions.conf — Pinned fallback versions for all installable tools
# =============================================================================
#
# This file is shell-sourceable (KEY=VALUE format). It defines the fallback
# versions used when the GitHub API is unreachable or rate-limited.
#
# To customize: edit the version values below, then re-run the installer.
# The installer will still attempt to fetch the latest release from GitHub;
# these values are only used as a safety net.
#
# To pin a specific version (skip the GitHub API check entirely), the install
# scripts can be modified to read directly from this file instead of querying
# the API.
# =============================================================================

# ── CLI Tools (cli-tools.sh) ────────────────────────────────────────────────
# Installed from GitHub releases with architecture-aware binary downloads.

LAZYGIT_VERSION="0.44.1"          # jesseduffield/lazygit — git TUI
DELTA_VERSION="0.18.2"            # dandavison/delta — git diff pager
DUST_VERSION="1.1.1"              # bootandy/dust — modern du
GLOW_VERSION="2.0.0"              # charmbracelet/glow — markdown renderer
YAZI_VERSION="25.4.8"             # sxyazi/yazi — file manager
ZELLIJ_VERSION="0.41.2"           # zellij-org/zellij — terminal multiplexer

# ── Shell (shell.sh) ──────────────────────────────────────────────────────
ATUIN_VERSION="18.4.0"            # atuinsh/atuin — shell history

# ── Developer Tools (dev-tools.sh) ──────────────────────────────────────────
# Go: fetched dynamically from https://go.dev/VERSION?m=text (no hardcoded
# fallback in the current scripts). Set a value here to use as a fallback
# if the go.dev API is unreachable.

GO_VERSION="go1.24.1"             # golang/go — NOTE: include the "go" prefix

# Node.js: installed via nvm with `nvm install --lts` (no pinned version).
# Set a value here if you want to pin a specific LTS release.

NODE_LTS_VERSION="22"             # nvm alias — major version number

# ── Editor (editor.sh) ─────────────────────────────────────────────────────
# Neovim: downloaded as AppImage from the "latest" release permalink.
# Set a value here to pin a specific release tag instead.

NEOVIM_VERSION="stable"           # neovim/neovim — "stable" or a tag like "0.10.4"
